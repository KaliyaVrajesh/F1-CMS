<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Distortion Effect - F1 Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      cursor: none;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s;
      mix-blend-mode: difference;
    }

    #cursor.active {
      width: 40px;
      height: 40px;
      border-color: rgba(255, 255, 255, 1);
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    #info h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    #info p {
      margin: 5px 0;
      opacity: 0.9;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      z-index: 999;
      text-align: center;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p>Loading Liquid Distortion Effect...</p>
  </div>

  <canvas id="canvas"></canvas>
  <div id="cursor"></div>

  <div id="info">
    <h3>🌊 Liquid Distortion Effect</h3>
    <p>Move your mouse to create ripples</p>
    <p>Reveals McLaren layer beneath Red Bull layer</p>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ============================================
    // CONFIGURATION
    // ============================================
    const config = {
      rippleIntensity: 0.12,
      rippleSpeed: 2.0,
      rippleFade: 0.95,
      maxRipples: 20,
      chromaticAberration: 0.005,
      refractionStrength: 0.2,
      displacementSize: 1024
    };

    // ============================================
    // SETUP
    // ============================================
    const canvas = document.getElementById('canvas');
    const cursor = document.getElementById('cursor');
    const loading = document.getElementById('loading');

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    
    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha: false,
      antialias: true,
      powerPreference: 'high-performance'
    });

    function setSize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }
    
    setSize();

    // ============================================
    // DISPLACEMENT CANVAS
    // ============================================
    const displacementCanvas = document.createElement('canvas');
    displacementCanvas.width = config.displacementSize;
    displacementCanvas.height = config.displacementSize;
    const displacementCtx = displacementCanvas.getContext('2d', { 
      willReadFrequently: false 
    });
    
    displacementCtx.fillStyle = '#000000';
    displacementCtx.fillRect(0, 0, config.displacementSize, config.displacementSize);
    
    const displacementTexture = new THREE.CanvasTexture(displacementCanvas);
    displacementTexture.minFilter = THREE.LinearFilter;
    displacementTexture.magFilter = THREE.LinearFilter;

    // ============================================
    // CREATE TEXTURES
    // ============================================
    function createTeamTexture(color1, color2, teamName, logoText) {
      const canvas = document.createElement('canvas');
      canvas.width = 2048;
      canvas.height = 2048;
      const ctx = canvas.getContext('2d');
      
      // Gradient background
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, color1);
      gradient.addColorStop(1, color2);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Add noise texture
      ctx.globalAlpha = 0.05;
      for (let i = 0; i < 5000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? '#ffffff' : '#000000';
        ctx.fillRect(
          Math.random() * canvas.width,
          Math.random() * canvas.height,
          2, 2
        );
      }
      ctx.globalAlpha = 1.0;
      
      // Team name
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      ctx.font = 'bold 120px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.letterSpacing = '10px';
      ctx.fillText(teamName, canvas.width / 2, canvas.height / 2 - 100);
      
      // Logo text
      ctx.font = 'bold 200px Arial, sans-serif';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.fillText(logoText, canvas.width / 2, canvas.height / 2 + 150);
      
      // Decorative elements
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.lineWidth = 3;
      
      // Racing stripes
      for (let i = 0; i < 5; i++) {
        const y = (i + 1) * (canvas.height / 6);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      
      // Corner accents
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 8;
      const cornerSize = 200;
      
      // Top-left
      ctx.beginPath();
      ctx.moveTo(0, cornerSize);
      ctx.lineTo(0, 0);
      ctx.lineTo(cornerSize, 0);
      ctx.stroke();
      
      // Top-right
      ctx.beginPath();
      ctx.moveTo(canvas.width - cornerSize, 0);
      ctx.lineTo(canvas.width, 0);
      ctx.lineTo(canvas.width, cornerSize);
      ctx.stroke();
      
      // Bottom-left
      ctx.beginPath();
      ctx.moveTo(0, canvas.height - cornerSize);
      ctx.lineTo(0, canvas.height);
      ctx.lineTo(cornerSize, canvas.height);
      ctx.stroke();
      
      // Bottom-right
      ctx.beginPath();
      ctx.moveTo(canvas.width - cornerSize, canvas.height);
      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(canvas.width, canvas.height - cornerSize);
      ctx.stroke();
      
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      return texture;
    }

    const foregroundTexture = createTeamTexture(
      '#0600ef',
      '#1e1b4b',
      'RED BULL RACING',
      'RB'
    );
    
    const backgroundTexture = createTeamTexture(
      '#ff8700',
      '#ea580c',
      'McLAREN F1 TEAM',
      'MCL'
    );

    // ============================================
    // SHADERS
    // ============================================
    const vertexShader = `
      varying vec2 vUv;
      
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      uniform sampler2D uForeground;
      uniform sampler2D uBackground;
      uniform sampler2D uDisplacement;
      uniform float uTime;
      uniform vec2 uResolution;
      uniform float uIntensity;
      uniform float uChromaticAberration;
      uniform float uRefractionStrength;
      
      varying vec2 vUv;
      
      void main() {
        // Sample displacement
        vec4 disp = texture2D(uDisplacement, vUv);
        float displacement = disp.r;
        
        // Calculate distortion
        vec2 distortion = vec2(0.0);
        
        if (displacement > 0.01) {
          // Normal mapping for refraction
          float dispLeft = texture2D(uDisplacement, vUv + vec2(-0.002, 0.0)).r;
          float dispRight = texture2D(uDisplacement, vUv + vec2(0.002, 0.0)).r;
          float dispUp = texture2D(uDisplacement, vUv + vec2(0.0, -0.002)).r;
          float dispDown = texture2D(uDisplacement, vUv + vec2(0.0, 0.002)).r;
          
          vec2 normal = vec2(dispRight - dispLeft, dispDown - dispUp);
          distortion = normal * uRefractionStrength * displacement;
          
          // Add wave motion
          float wave = sin(vUv.y * 30.0 + uTime * 3.0) * cos(vUv.x * 30.0 + uTime * 2.0);
          distortion += wave * displacement * 0.015;
        }
        
        // Apply distortion
        vec2 distortedUv = vUv + distortion * uIntensity;
        distortedUv = clamp(distortedUv, 0.0, 1.0);
        
        // Chromatic aberration
        vec3 foregroundColor;
        if (displacement > 0.15) {
          float aberration = uChromaticAberration * displacement;
          float r = texture2D(uForeground, distortedUv + vec2(aberration, 0.0)).r;
          float g = texture2D(uForeground, distortedUv).g;
          float b = texture2D(uForeground, distortedUv - vec2(aberration, 0.0)).b;
          foregroundColor = vec3(r, g, b);
        } else {
          foregroundColor = texture2D(uForeground, distortedUv).rgb;
        }
        
        // Sample background
        vec3 backgroundColor = texture2D(uBackground, vUv).rgb;
        
        // Reveal calculation
        float revealFactor = smoothstep(0.25, 0.75, displacement);
        
        // Edge glow
        float edgeGlow = 0.0;
        if (displacement > 0.3 && displacement < 0.7) {
          edgeGlow = sin((displacement - 0.3) * 3.14159 / 0.4) * 0.4;
        }
        
        // Mix colors
        vec3 finalColor = mix(foregroundColor, backgroundColor, revealFactor);
        finalColor += vec3(1.0, 1.0, 1.0) * edgeGlow;
        
        // Subtle vignette
        vec2 vignetteUv = vUv * 2.0 - 1.0;
        float vignette = 1.0 - dot(vignetteUv, vignetteUv) * 0.15;
        finalColor *= vignette;
        
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `;

    // ============================================
    // MATERIAL
    // ============================================
    const material = new THREE.ShaderMaterial({
      uniforms: {
        uForeground: { value: foregroundTexture },
        uBackground: { value: backgroundTexture },
        uDisplacement: { value: displacementTexture },
        uTime: { value: 0 },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        uIntensity: { value: config.rippleIntensity },
        uChromaticAberration: { value: config.chromaticAberration },
        uRefractionStrength: { value: config.refractionStrength }
      },
      vertexShader,
      fragmentShader
    });

    const geometry = new THREE.PlaneGeometry(2, 2);
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // ============================================
    // RIPPLE CLASS
    // ============================================
    class Ripple {
      constructor(x, y, velocity = 1) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = 250;
        this.strength = 1.0;
        this.velocity = velocity;
        this.alive = true;
      }

      update(deltaTime) {
        this.radius += this.velocity * config.rippleSpeed * deltaTime * 60;
        this.strength *= config.rippleFade;
        
        if (this.strength < 0.01 || this.radius > this.maxRadius) {
          this.alive = false;
        }
      }

      draw(ctx) {
        if (!this.alive) return;

        const x = (this.x / window.innerWidth) * config.displacementSize;
        const y = (this.y / window.innerHeight) * config.displacementSize;
        const radius = (this.radius / window.innerWidth) * config.displacementSize;

        // Multiple rings for realistic ripple
        for (let i = 0; i < 3; i++) {
          const ringRadius = radius + i * 25;
          const ringStrength = this.strength * (1 - i * 0.25);
          
          const gradient = ctx.createRadialGradient(
            x, y, ringRadius * 0.6,
            x, y, ringRadius
          );
          
          gradient.addColorStop(0, `rgba(255, 255, 255, 0)`);
          gradient.addColorStop(0.5, `rgba(255, 255, 255, ${ringStrength})`);
          gradient.addColorStop(1, `rgba(255, 255, 255, 0)`);

          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(x, y, ringRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // ============================================
    // MOUSE INTERACTION
    // ============================================
    const ripples = [];
    const mouse = { x: 0, y: 0, prevX: 0, prevY: 0 };

    function handlePointerMove(event) {
      const x = event.clientX;
      const y = event.clientY;

      // Update cursor
      cursor.style.left = x + 'px';
      cursor.style.top = y + 'px';

      // Calculate velocity
      const dx = x - mouse.x;
      const dy = y - mouse.y;
      const velocity = Math.sqrt(dx * dx + dy * dy);

      mouse.prevX = mouse.x;
      mouse.prevY = mouse.y;
      mouse.x = x;
      mouse.y = y;

      // Create ripple
      if (velocity > 0.5 && ripples.length < config.maxRipples) {
        const rippleVelocity = Math.min(velocity * 0.04, 2.5);
        ripples.push(new Ripple(x, y, rippleVelocity));
        
        // Cursor feedback
        cursor.classList.add('active');
        setTimeout(() => cursor.classList.remove('active'), 100);
      }
    }

    function handlePointerDown() {
      ripples.push(new Ripple(mouse.x, mouse.y, 1.5));
      cursor.classList.add('active');
    }

    function handlePointerUp() {
      cursor.classList.remove('active');
    }

    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mousedown', handlePointerDown);
    window.addEventListener('mouseup', handlePointerUp);

    // Touch support
    window.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      handlePointerMove({ clientX: touch.clientX, clientY: touch.clientY });
    }, { passive: false });

    window.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
      handlePointerDown();
    });

    window.addEventListener('touchend', handlePointerUp);

    // ============================================
    // ANIMATION LOOP
    // ============================================
    let lastTime = performance.now();

    function animate(currentTime) {
      const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.1);
      lastTime = currentTime;

      // Fade displacement
      displacementCtx.fillStyle = 'rgba(0, 0, 0, 0.04)';
      displacementCtx.fillRect(0, 0, config.displacementSize, config.displacementSize);

      // Update ripples
      for (let i = ripples.length - 1; i >= 0; i--) {
        ripples[i].update(deltaTime);
        
        if (ripples[i].alive) {
          ripples[i].draw(displacementCtx);
        } else {
          ripples.splice(i, 1);
        }
      }

      // Update texture
      displacementTexture.needsUpdate = true;
      material.uniforms.uTime.value = currentTime * 0.001;

      // Render
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    // ============================================
    // RESIZE
    // ============================================
    window.addEventListener('resize', () => {
      setSize();
      material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    });

    // ============================================
    // START
    // ============================================
    setTimeout(() => {
      loading.style.display = 'none';
      animate(performance.now());
    }, 500);
  </script>
</body>
</html>
